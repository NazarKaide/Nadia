    <style>
        :root {
            --bg-dark: #121212;
            --accent-gold: #e2b0b0;
            --accent-pink: #ff4d6d;
            --text-light: #f5f5f5;
            --glass-white: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.7;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* --- Floating Background Hearts --- */
        .background-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-heart {
            position: absolute;
            background-color: var(--accent-gold);
            opacity: 0.1;
            aspect-ratio: 1/1;
            transform: rotate(-45deg);
            animation: floating 10s ease-in-out infinite;
            transition: background-color 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
        }

        .bg-heart:before, .bg-heart:after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: inherit;
            border-radius: 50%;
        }
        .bg-heart:before { top: -50%; left: 0; }
        .bg-heart:after { left: 50%; top: 0; }

        @keyframes floating {
            0%, 100% { transform: rotate(-45deg) translateY(0) translateX(0); }
            50% { transform: rotate(-45deg) translateY(-40px) translateX(20px); opacity: 0.2; }
        }

        /* --- Hero --- */
        .header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(18, 18, 18, 0.7), rgba(18, 18, 18, 0.9)), 
                        url('img/main.jpg') center/cover no-repeat fixed;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--accent-gold);
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        /* --- Interactive Heart --- */
        .heart-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
            position: relative;
        }

        .main-heart {
            background-color: var(--accent-gold);
            height: 50px;
            width: 50px;
            position: relative;
            transform: rotate(-45deg);
            cursor: pointer;
            animation: pulse 1.5s infinite;
            z-index: 10;
        }

        .main-heart:before, .main-heart:after {
            content: "";
            background-color: inherit;
            border-radius: 50%;
            height: 50px;
            width: 50px;
            position: absolute;
        }
        .main-heart:before { top: -25px; left: 0; }
        .main-heart:after { left: 25px; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            15% { transform: rotate(-45deg) scale(1.2); }
            30% { transform: rotate(-45deg) scale(1); }
        }

        .particle {
            position: fixed;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes particle-out {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* --- Content Blocks --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 25px; }
        
        .bento-grid {

    @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

    .granger-credits {
        font-family: 'Space Mono', monospace; /* Витончений шрифт */

        position: absolute;

        /* Тінь, щоб текст не губився на світлому фоні */
        text-shadow: 0 1px 2px rgba(0,0,0,0.5); 
        margin: 0 auto;
        text-align: center;
    }

    /* Створюємо один тонкий шар для глічу */
    .granger-credits::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        color: #fff;
        background: transparent; /* Без чорного фону */
        clip: rect(0, 0, 0, 0); /* Спочатку схований */
        opacity: 0;
        /* Тонке RGB зміщення */
        text-shadow: -1px 0 #00fff9, 1px 0 #ff00c1;
    }

    /* Анімація суто для шару глічу */
    .granger-credits:hover::after {
        /* Активується при наведенні, або зробіть 'infinite', якщо треба постійно */
        animation: noise-anim 2s infinite linear alternate-reverse;
        opacity: 1;
    }

    /* М'яка пульсація основного тексту */
    .granger-credits {
        animation: text-glow 4s infinite;
    }

    /* --- НОВІ, ТОНКІ АНІМАЦІЇ --- */

    @keyframes text-glow {
        0%, 100% { color: rgba(255, 255, 255, 0.8); }
        50% { color: rgba(255, 255, 255, 0.5); }
    }

    @keyframes noise-anim {
        /* Гліч з'являється дуууже коротко (тільки на 10-15% часу) */
        0%, 10%, 100% { clip: rect(0, 0, 0, 0); opacity: 0; }
        11% { clip: rect(10px, 9999px, 11px, 0); opacity: 1; transform: scale(1.02); }
        12% { clip: rect(30px, 9999px, 32px, 0); opacity: 1; transform: translateX(-1px); }
        13% { clip: rect(0, 0, 0, 0); opacity: 0; }
        14% { clip: rect(50px, 9999px, 51px, 0); opacity: 1; transform: translateX(1px); }
        15% { clip: rect(0, 0, 0, 0); opacity: 0; }
    }

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // 1. Ефект вибуху частинок при кліку на серце
        document.getElementById('main-heart').addEventListener('click', function(e) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 8 + 4;
                p.style.width = p.style.height = size + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                p.style.animation = 'particle-out 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards';
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        });

        // 2. Зміна кольору фонових сердець при скролі
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            const hearts = document.querySelectorAll('.bg-heart');
            
            hearts.forEach(heart => {
                if (scrollPercent > 0.3) {
                    // Перехід до рожевого кольору
                    heart.style.backgroundColor = 'var(--accent-pink)';
                    heart.style.filter = 'drop-shadow(0 0 10px rgba(255, 77, 109, 0.4))';
                    heart.style.opacity = '0.25';
                } else {
                    // Повернення до золотого
                    heart.style.backgroundColor = 'var(--accent-gold)';
                    heart.style.filter = 'none';
                    heart.style.opacity = '0.1';
                }
            });
        });
    </script>
